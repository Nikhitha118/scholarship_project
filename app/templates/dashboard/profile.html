{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-lg">

            <div class="card-body p-5">

                <h2 class="mb-4">
                    <i class="bi bi-person-circle text-primary"></i>
                    My Profile
                </h2>

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">CGPA</label>
                            <input type="number" step="0.01"
                                   class="form-control"
                                   name="cgpa"
                                   value="{{ current_user.cgpa or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Course</label>
                            <input type="text"
                                   class="form-control"
                                   name="course"
                                   value="{{ current_user.course or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Branch</label>
                            <input type="text"
                                   class="form-control"
                                   name="branch"
                                   value="{{ current_user.branch or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">College Name</label>
                            <input type="text"
                                   class="form-control"
                                   name="college_name"
                                   value="{{ current_user.college_name or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Year of Study</label>
                            <input type="number"
                                   class="form-control"
                                   name="year_of_study"
                                   value="{{ current_user.year_of_study or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category</label>
                            <select class="form-control" name="category">
                                <option value="">Select Category</option>
                                <option value="General" {% if current_user.category=="General" %}selected{% endif %}>General</option>
                                <option value="OBC" {% if current_user.category=="OBC" %}selected{% endif %}>OBC</option>
                                <option value="SC" {% if current_user.category=="SC" %}selected{% endif %}>SC</option>
                                <option value="ST" {% if current_user.category=="ST" %}selected{% endif %}>ST</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Gender</label>
                            <select class="form-control" name="gender">
                                <option value="">Select Gender</option>
                                <option value="Male" {% if current_user.gender=="Male" %}selected{% endif %}>Male</option>
                                <option value="Female" {% if current_user.gender=="Female" %}selected{% endif %}>Female</option>
                                <option value="Other" {% if current_user.gender=="Other" %}selected{% endif %}>Other</option>
                            </select>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">State</label>
                            <input type="text"
                                   class="form-control"
                                   name="state"
                                   value="{{ current_user.state or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Income (Annual)</label>
                            <input type="number"
                                   class="form-control"
                                   name="income"
                                   value="{{ current_user.income or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   class="form-control"
                                   name="phone"
                                   value="{{ current_user.phone or '' }}">
                        </div>

                    </div>

                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-check-circle"></i>
                        Save Profile
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
