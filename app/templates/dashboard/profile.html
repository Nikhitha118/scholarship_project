{% extends "base.html" %}

{% block title %}Profile{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card shadow-lg">

            <div class="card-body p-5">

                <h2 class="mb-4">
                    <i class="bi bi-person-circle text-primary"></i>
                    My Profile
                </h2>

                <form method="POST">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label class="form-label">CGPA</label>
                            <input type="number"
                                   step="0.01"
                                   class="form-control"
                                   name="cgpa"
                                   value="{{ current_user.cgpa or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Course</label>
                            <input type="text"
                                   class="form-control"
                                   name="course"
                                   value="{{ current_user.course or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Year of Study</label>
                            <input type="number"
                                   class="form-control"
                                   name="year_of_study"
                                   value="{{ current_user.year_of_study or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Category</label>
                            <input type="text"
                                   class="form-control"
                                   name="category"
                                   value="{{ current_user.category or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Income</label>
                            <input type="number"
                                   class="form-control"
                                   name="income"
                                   value="{{ current_user.income or '' }}">
                        </div>

                        <div class="col-md-6 mb-3">
                            <label class="form-label">Phone</label>
                            <input type="text"
                                   class="form-control"
                                   name="phone"
                                   value="{{ current_user.phone or '' }}">
                        </div>

                    </div>

                    <button class="btn btn-primary">
                        <i class="bi bi-check-circle"></i>
                        Save Profile
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
