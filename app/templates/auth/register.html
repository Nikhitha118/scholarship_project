{% extends "base.html" %}
{% block title %}Register - Life Pilot AI{% endblock %}

{% block content %}
<div class="row justify-content-center auth-page">
    <div class="col-md-8 col-lg-6">
        <div class="card auth-card">
            <div class="card-body p-5">
                <h2 class="text-center mb-4 auth-title"></h2>
                    <i class="bi bi-person-plus text-primary"></i> Register
                </h2>
                
                <form method="POST">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="first_name" class="form-label">First Name</label>
                            <input type="text" class="form-control" id="first_name" name="first_name" required>
                        </div>
                        
                        <div class="col-md-6 mb-3">
                            <label for="last_name" class="form-label">Last Name</label>
                            <input type="text" class="form-control" id="last_name" name="last_name" required>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               required minlength="8" title="Password must be at least 8 characters">
                        <div class="form-text">Minimum 8 characters</div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-auth w-100">
                        <i class="bi bi-person-plus"></i> Register
                    </button>
                </form>
                
                <hr>
                <p class="text-center mb-0">
                    Already have an account? 
                    <a class="auth-link" href="{{ url_for('auth.login') }}"></a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
